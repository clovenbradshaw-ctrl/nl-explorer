
<h2 class="sr-only">Right panel grain inspector — click any grain level to see how the inspector adapts from token to concept cluster</h2>
<style>

.gs-btn{font-family:var(--font-mono);font-size:9px;padding:3px 8px;border-radius:3px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .12s;letter-spacing:.04em;}
.gs-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary);}
.gs-btn.act{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);}
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--color-background-secondary);}
.r-topbar{padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:6px;background:var(--color-background-primary);}
.r-title{font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);letter-spacing:.12em;text-transform:uppercase;flex:1;}
.read-state{display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:9px;}
.rs-icon{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rs-ghost{border:1px dashed var(--color-border-secondary);background:transparent;}
.rs-skim{border:1px solid #BA7517;background:transparent;}
.rs-read{background:#1D9E75;}
.rs-reread{background:#378ADD;}
.r-body{flex:1;overflow-y:auto;}
.crumb-zone{padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);}
.crumb-row{display:flex;gap:0;align-items:center;overflow-x:auto;padding-bottom:2px;}
.crumb-item{display:flex;align-items:center;gap:0;flex-shrink:0;}
.crumb-btn{font-family:var(--font-mono);font-size:9px;padding:3px 7px;border-radius:3px;cursor:pointer;color:var(--color-text-tertiary);transition:all .1s;white-space:nowrap;}
.crumb-btn:hover{color:var(--color-text-secondary);background:var(--color-background-secondary);}
.crumb-btn.current{color:var(--color-text-primary);background:var(--color-background-secondary);font-weight:500;}
.crumb-sep{font-size:10px;color:var(--color-border-primary);padding:0 1px;}
.focus-zone{padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);}
.fz-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.grain-badge{font-family:var(--font-mono);font-size:8px;padding:2px 6px;border-radius:3px;flex-shrink:0;}
.fz-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;line-height:1.3;}
.fz-anchor{font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);margin-bottom:6px;}
.fz-text{font-family:var(--font-serif);font-size:11.5px;color:var(--color-text-secondary);line-height:1.5;padding:6px 8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);}
.read-bar{margin-top:8px;padding:6px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;background:var(--color-background-primary);}

.doc-contrib:hover{background:var(--color-background-primary);}
.dc-bar{flex:1;height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;}
.dc-fill{height:100%;border-radius:2px;background:#1D9E75;}
.dc-label{font-size:11px;color:var(--color-text-secondary);width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.sp{border-radius:2px;padding:1px 2px;cursor:pointer;transition:all .1s;}
.sp:hover{filter:brightness(.9);}
.sp.sel{outline:1.5px solid currentColor;outline-offset:1px;}
.sp-tok{background:rgba(83,74,183,.14);color:#3C3489;}
.sp-cl{background:rgba(186,118,50,.14);color:#633806;}
.sp-sent{background:rgba(29,158,117,.14);color:#085041;}

.em-icon{font-size:20px;opacity:.3;}

      {op:'SIG',label:'NDMC PSO LLC',basis:'skim · structural neighbor',conf:'skim',read:false},

    readState:'skim',
    text:'Full paragraph spanning the NDP funding receipt, disclosure failure, authorization chain, and Metro Council approval.',

    contains:[

let currentDemo = 'clause';
let isReading = false;

const RAW_TEXT = `The <sp g="token" id="t1" w="Nashville">Nashville</sp> <sp g="token" id="t2" w="Downtown">Downtown</sp> <sp g="token" id="t3" w="Partnership">Partnership</sp> <sp g="sentence" id="s1"><sp g="clause" id="cl1">received <sp g="token" id="t4" w="$4.2">$4.2</sp> million in public funds from Metro Nashville in fiscal year 2019</sp>, but <sp g="clause" id="cl2">failed to disclose the allocation in its annual report</sp></sp>. <sp g="sentence" id="s2"><sp g="token" id="t5" w="Mayor">Mayor</sp> Cooper's office authorized the transfer in March 2020.</sp> NDP transferred the funds to a private contractor without competitive bidding. <sp g="sentence" id="s3">Metro Council approved a separate $1.8 million contract with the same vendor in June 2020.</sp> <sp g="clause" id="cl3">No record of the original authorization exists in public filings.</sp> The Office of Homeless Services allocated $2.3 million to NDP in FY2020-2021, which <sp g="token" id="t6" w="contradicts">contradicts</sp> the $1.9 million figure reported in the Metro budget.`;

function buildDocText(activeGrain) {
  const grainCls = {token:'sp-tok',clause:'sp-cl',sentence:'sp-sent',paragraph:'sp-para',section:'sp-fn'};
  return RAW_TEXT.replace(/<sp g="(\w+)"[^>]*>([\s\S]*?)<\/sp>/g, (m, g, content) => {
    const cls = grainCls[g] || '';
    if (!cls) return content;
    const dimmed = activeGrain && activeGrain !== g ? ' sp-dim' : '';
    return `<span class="sp ${cls}${dimmed}" onclick="setDemo('${g}')" title="${g} grain">${content.replace(/<sp[^>]*>([\s\S]*?)<\/sp>/g,'$1')}</span>`;
  });
}

function setDemo(grain) {
  currentDemo = grain;
  document.querySelectorAll('.gs-btn').forEach(b => {
    b.classList.toggle('act', b.textContent.trim() === grain || (grain==='cluster' && b.textContent.trim()==='cluster'));
  });
  document.getElementById('doc-body').innerHTML = buildDocText(
    ['token','clause','sentence','paragraph'].includes(grain) ? grain : null
  );
  renderInspector(grain);
}

function renderInspector(grain) {
  const d = DEMOS[grain];
  if (!d) return;
  const gm = GRAIN_META[grain];

  const rsIcon = document.getElementById('rs-icon');
  const rsLabel = document.getElementById('rs-label');
  rsIcon.className = 'rs-icon ' + (d.readState==='read'?'rs-read':d.readState==='reread'?'rs-reread':d.readState==='skim'?'rs-skim':'rs-ghost');
  const rsText = {ghost:'never focused',skim:'skimmed',read:'read',reread:'re-read from position'}[d.readState]||d.readState;
  rsLabel.textContent = rsText;
  rsLabel.style.color = d.readState==='read'?'#1D9E75':d.readState==='reread'?'#378ADD':d.readState==='skim'?'#BA7517':'var(--color-text-tertiary)';

  const chain = [...(d.parent_chain||[]), grain==='cluster'?'cluster: '+d.name : gm.label];
  const crumbs = chain.map((c,i) => {
    const isLast = i===chain.length-1;
    return `<div class="crumb-item">
      ${i>0?'<span class="crumb-sep">/</span>':''}
      <span class="crumb-btn ${isLast?'current':''}">${c.length>18?c.slice(0,17)+'…':c}</span>
    </div>`;
  }).join('');

  const readBar = d.readState === 'ghost' || d.readState === 'skim'
    ? `<div class="read-bar">
        <div class="rb-icon" style="border:1px solid #BA7517;background:transparent;"></div>
        <span class="rb-text">${d.honesty||'not yet embedded — relations from skim signals only'}</span>
        <button class="rb-action" id="read-btn" onclick="triggerRead('${grain}')">read now</button>
       </div>`
    : `<div class="read-bar">
        <div class="rb-icon" style="background:${d.readState==='reread'?'#378ADD':'#1D9E75'};"></div>
        <span class="rb-text">${d.readState==='reread'?'re-read from current position':'embedded'} · ${d.readTs||''}</span>
        <button class="rb-action" onclick="triggerReread('${grain}')">re-read ↻</button>
       </div>`;

  let containsHtml = '';
  if ((d.contains||[]).length > 0) {
    const rows = d.contains.map(c => {
      const cop = GRAIN_META[c.grain]||{col:'#888'};
      const readDot = c.read
        ? `<div style="width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0;"></div>`
        : `<div style="width:6px;height:6px;border-radius:50%;border:1px solid #BA7517;flex-shrink:0;"></div>`;
      const opBadge = `<span style="font-family:var(--font-mono);font-size:8px;padding:1px 4px;border-radius:2px;background:rgba(128,128,128,.1);color:var(--color-text-tertiary);">${c.op}</span>`;
      return `<div class="contains-row" onclick="setDemo('${c.grain}')">
        ${readDot}
        <span class="cr-label">${c.label}</span>
        ${opBadge}
        <span class="cr-read">${c.grain}</span>
      </div>`;
    }).join('');
    containsHtml = `<div class="contains-zone">
      <div class="cz-hdr">contains · ${d.contains.length}</div>
      ${rows}
    </div>`;
  }

  let clusterHtml = '';
  if (d.docContribs) {
    const rows = d.docContribs.map(dc => {
      const readDot = dc.read
        ? `<div style="width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0;"></div>`
        : `<div style="width:6px;height:6px;border-radius:50%;border:1px solid #BA7517;flex-shrink:0;"></div>`;
      return `<div class="doc-contrib">
        ${readDot}
        <span class="dc-label">${dc.doc}</span>
        <div class="dc-bar"><div class="dc-fill" style="width:${dc.pct}%;"></div></div>
        <span class="dc-pct">${dc.pct}%</span>
      </div>`;
    }).join('');
    clusterHtml = `<div class="cluster-zone">
      <div class="cz-hdr">document contributions</div>
      ${rows}
    </div>`;
  }

  const spoHtml = d.spo ? `<div style="padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);">
    <div style="font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;">SPO · ${grain} grain</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;">
      <span style="font-size:10px;background:rgba(29,158,117,.12);color:#085041;padding:2px 6px;border-radius:3px;">${d.spo.s}</span>
      <span style="font-size:10px;background:rgba(186,118,50,.12);color:#633806;padding:2px 6px;border-radius:3px;">${d.spo.p}</span>
      <span style="font-size:10px;background:rgba(55,138,221,.12);color:#0C447C;padding:2px 6px;border-radius:3px;">${d.spo.o}</span>
    </div>
  </div>` : '';

  const honesty = d.honesty ? `<div style="font-size:10px;color:var(--color-text-tertiary);font-style:italic;padding:2px 4px;">${d.honesty}</div>` : '';
  const relRows = (d.relations||[]).map(r => {
    const rc = GRAIN_META[r.op?.toLowerCase()]?.col || '#888';
    const rb = GRAIN_META[r.op?.toLowerCase()]?.bg || 'rgba(128,128,128,.1)';
    const confDisp = r.read ? (typeof r.conf==='number'?r.conf.toFixed(2):r.conf) : r.conf;
    const confCol = r.read ? 'var(--color-text-secondary)' : 'var(--color-text-tertiary)';
    const basisStyle = r.read ? '' : 'font-style:italic;';
    return `<div class="rel-row">
      <span class="rr-op" style="background:${rb};color:${rc};">${r.op}</span>
      <div class="rr-info">
        <div class="rr-label">${r.label}</div>
        <div class="rr-basis" style="${basisStyle}">${r.basis}</div>
      </div>
      <span class="rr-conf" style="color:${confCol};">${confDisp}</span>
    </div>`;
  }).join('');

  const evaHtml = (d.eva||[]).length ? (d.eva||[]).map(e => {
    const ec = e.result==='satisfies'?'#1D9E75':e.result==='conflicts'?'#A32D2D':'#BA7517';
    const eb = e.result==='satisfies'?'rgba(29,158,117,.1)':e.result==='conflicts'?'rgba(163,45,45,.1)':'rgba(186,118,50,.1)';
    return `<div class="ev-row">
      <span class="ev-badge" style="background:${eb};color:${ec};">${e.result}</span>
      <div><div class="ev-text">${e.text}</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);margin-top:1px;">${e.src}</div></div>
    </div>`;
  }).join('') : '';

  const pressureHtml = d.pressure ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
    <div style="font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);letter-spacing:.1em;text-transform:uppercase;">EVA history</div>
    <span style="font-family:var(--font-mono);font-size:8px;padding:1px 6px;border-radius:3px;background:rgba(163,45,45,.1);color:#A32D2D;">z=${d.pressure.z>0?'+':''}${d.pressure.z} · ${d.pressure.level}</span>
  </div>` : `<div style="font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;">EVA history</div>`;

  const cellHtml = d.cell ? `<div style="margin-top:6px;display:flex;align-items:center;gap:5px;">
    <span style="font-family:var(--font-mono);font-size:8px;padding:2px 6px;border-radius:3px;background:${gm.bg};color:${gm.col};">${d.cell}</span>
    ${d.cellConf?`<div style="width:32px;height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;"><div style="width:${Math.round(d.cellConf*100)}%;height:100%;background:${gm.col};border-radius:2px;"></div></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);">${Math.round(d.cellConf*100)}%</span>`:''}
  </div>` : '';

  const nulHtml = d.nul_state ? `<div style="font-family:var(--font-mono);font-size:9px;padding:3px 6px;border-radius:3px;background:rgba(153,53,86,.08);color:#993556;margin-top:4px;">absence state: ${d.nul_state}</div>` : '';

  document.getElementById('r-body').innerHTML = `
    <div class="crumb-zone"><div class="crumb-row">${crumbs}</div></div>
    <div class="focus-zone">
      <div class="fz-header">
        <span class="grain-badge" style="background:${gm.bg};color:${gm.col};">${gm.label}</span>
        ${grain==='cluster'?`<span style="font-family:var(--font-mono);font-size:8px;color:var(--color-text-tertiary);">synthetic · M only</span>`:''}
      </div>
      <div class="fz-name">${d.name}</div>
      <div class="fz-anchor">${d.anchor}</div>
      <div class="fz-text">${d.text}</div>
      ${cellHtml}
      ${nulHtml}
      ${readBar}
    </div>
    ${containsHtml}
    ${clusterHtml}
    ${spoHtml}
    <div class="rel-zone">
      <div class="rz-hdr">relations <span class="rz-honesty" id="rel-honesty"></span></div>
      ${honesty}
      ${relRows}
    </div>
    ${evaHtml ? `<div class="eva-zone">${pressureHtml}${evaHtml}</div>` : ''}
  `;
}

function triggerRead(grain) {
  const btn = document.getElementById('read-btn');
  if (!btn) return;
  btn.textContent = 'reading…';
  btn.classList.add('reading');
  btn.disabled = true;
  setTimeout(() => {
    DEMOS[grain].readState = 'read';
    DEMOS[grain].readTs = new Date().toLocaleString('en',{hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    delete DEMOS[grain].honesty;
    DEMOS[grain].relations = DEMOS[grain].relations.map(r => ({
      ...r,
      read: true,
      conf: typeof r.conf === 'string' ? (0.6+Math.random()*.3) : r.conf,
      basis: r.basis.replace('skim · ','embedded · ')
    }));
    renderInspector(grain);
  }, 900);
}

function triggerReread(grain) {
  DEMOS[grain].readState = 'reread';
  DEMOS[grain].readTs = new Date().toLocaleString('en',{hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' (from current position)';
  renderInspector(grain);
}

setDemo('clause');
</script>
